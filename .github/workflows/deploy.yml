name: Deploy to Lightsail

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 코드 체크아웃
      - name: Checkout code
        uses: actions/checkout@v3

      # JDK 21 설치
      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'

      # 백엔드 빌드 (테스트 제외)
      - name: Build backend
        working-directory: backend
        run: |
          chmod +x gradlew
          ./gradlew build -x test

      # Node.js 설치
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      # 프론트엔드 빌드
      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      # Lightsail에 백엔드 jar 전송 (plain jar 제외)
      - name: Copy backend jar
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.LIGHTSAIL_HOST }}
          username: ${{ secrets.LIGHTSAIL_USERNAME }}
          key: ${{ secrets.LIGHTSAIL_SSH_KEY }}
          source: "backend/build/libs/*[^plain].jar"
          target: "/home/ubuntu/pulsespace"
          strip_components: 3

      # Lightsail에 프론트엔드 빌드 결과물 전송
      - name: Copy frontend dist
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.LIGHTSAIL_HOST }}
          username: ${{ secrets.LIGHTSAIL_USERNAME }}
          key: ${{ secrets.LIGHTSAIL_SSH_KEY }}
          source: "frontend/dist/*"
          target: "/var/www/pulsespace"
          strip_components: 2

      # Lightsail에서 애플리케이션 재시작
      - name: Start application
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.LIGHTSAIL_HOST }}
          username: ${{ secrets.LIGHTSAIL_USERNAME }}
          key: ${{ secrets.LIGHTSAIL_SSH_KEY }}
          script: |
            sudo systemctl stop pulsespace || true
            sudo systemctl start pulsespace
            echo "배포 완료"